# [可更改] 这个工作流的名称，会显示在 GitHub Actions 页面的左侧列表里
name: ReleaseX

# [保持原样] 触发条件：推送以 'edl2srt-v' 或 'other-v' 或 'zqinfoss-v' 开头的 tag 时触发工作流
on:
  push:
    tags:
      - 'edl2srt-v*'  # [可更改] edl2srt项目的tag前缀（如 edl2srt-v1.0.0）
      - 'other-v*'    # [可更改] other-project项目的tag前缀（如 other-v2.1.3）
      - 'zqinfoss-v*' # [新增] zqinfoss项目的tag前缀（如 zqinfoss-v1.0.0）

# [保持原样] 必须要给的权限，否则 Actions 没有权利去你的仓库里创建 Release
permissions:
  contents: write

jobs:
  # ==========================================
  # 项目 1：edl2srt
  # ==========================================
  release-edl2srt:
    # 【关键修复】门卫判断：startsWith 不支持 *，必须去掉 *。只有以 'edl2srt-v' 开头才运行
    if: startsWith(github.ref_name, 'edl2srt-v')
    # [可更改] 运行环境。因为是编译 Windows exe，所以用 windows-latest
    runs-on: windows-latest

    steps:
      # [保持原样] 第 1 步：拉取代码到 Actions 虚拟机
      - name: Checkout Code
        uses: actions/checkout@v7

      # [保持原样] 第 2 步：安装 Rust 环境
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # [保持原样] 第 3 步：编译项目
      - name: Build Executable
        run: |
          cd _prop/edl2srt
          cargo build --release --target x86_64-pc-windows-msvc

      # [修改] 第 4 步：重命名 exe 文件，提取出 v* 部分作为名字
      - name: Rename Executable
        run: |
          cd _prop/edl2srt/target/x86_64-pc-windows-msvc/release/
          # 获取完整的 tag 名（如 edl2srt-v1.0.0）
          $full_tag = "${{ github.ref_name }}"
          # 截取从 "-v" 开始的部分，得到 "v1.0.0"
          $version = $full_tag.Substring($full_tag.IndexOf('-v') + 1)
          # 把 exe 改名为 edl2srt-v1.0.0-windows-x64.exe
          Rename-Item -Path edl2srt.exe -NewName "edl2srt-$version-windows-x64.exe"

      # [保持原样] 第 5 步：上传到 GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          # 【修改点】这里用通配符 v* 匹配刚才改名后的文件
          files: |
            _prop/edl2srt/target/x86_64-pc-windows-msvc/release/edl2srt-v*-windows-x64.exe
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: _prop/edl2srt/CHANGELOG.md
          prerelease: false
          draft: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 项目 2：zqinfoss
  # ==========================================
  release-zqinfoss:
    # 【新增】门卫判断：只有以 'zqinfoss-v' 开头才运行
    if: startsWith(github.ref_name, 'zqinfoss-v')
    # [可更改] 运行环境。因为是编译 Windows exe，所以用 windows-latest
    runs-on: windows-latest

    steps:
      # [保持原样] 第 1 步：拉取代码到 Actions 虚拟机
      - name: Checkout Code
        uses: actions/checkout@v7

      # [保持原样] 第 2 步：安装 Rust 环境（假设 zqinfoss 也是 Rust 项目）
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # [保持原样] 第 3 步：编译项目
      - name: Build Executable
        run: |
          cd _prop/zqinfoss
          cargo build --release --target x86_64-pc-windows-msvc

      # [修改] 第 4 步：重命名 exe 文件，提取出 v* 部分作为名字
      - name: Rename Executable
        run: |
          cd _prop/zqinfoss/target/x86_64-pc-windows-msvc/release/
          # 获取完整的 tag 名（如 zqinfoss-v1.0.0）
          $full_tag = "${{ github.ref_name }}"
          # 截取从 "-v" 开始的部分，得到 "v1.0.0"
          $version = $full_tag.Substring($full_tag.IndexOf('-v') + 1)
          # 把 exe 改名为 zqinfoss-v1.0.0-windows-x64.exe
          Rename-Item -Path zqinfoss.exe -NewName "zqinfoss-$version-windows-x64.exe"

      # [保持原样] 第 5 步：上传到 GitHub Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          # 【修改点】这里用通配符 v* 匹配刚才改名后的文件
          files: |
            _prop/zqinfoss/target/x86_64-pc-windows-msvc/release/zqinfoss-v*-windows-x64.exe
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: _prop/zqinfoss/CHANGELOG.md
          prerelease: false
          draft: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
